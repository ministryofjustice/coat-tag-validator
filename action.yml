name: 'COAT Tag Validator'
description: 'Validates Terraform resources have required tags using Checkov'
author: 'Ministry of Justice'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  terraform_directory:
    description: 'Path to Terraform files'
    required: true
    default: '.'
  soft_fail:
    description: 'Return exit code 0 even if violations found'
    required: false
    default: 'false'
  terraform_workspace:
    description: 'Terraform workspace name'
    required: false
    default: ''

outputs:
  violations_count:
    description: 'Number of tag violations found'
    value: ${{ steps.parse.outputs.violations_count }}
  violations_summary:
    description: 'Markdown summary of violations for PR comments'
    value: ${{ steps.parse.outputs.violations_summary }}
  passed:
    description: 'Whether validation passed (true/false)'
    value: ${{ steps.parse.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Set Up UV
      id: setup_uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "latest"
        python-version: "3.12"
        enable-cache: false

    - name: Install dependencies
      shell: bash
      run: uv pip install -r ${{ github.action_path }}/requirements.txt

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_wrapper: false

    - name: Generate Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      env:
        WORKSPACE: ${{ inputs.terraform_workspace }}
      run: python3 -u ${{ github.action_path }}/bin/run_terraform_plan.py

    - name: Run Checkov on plan
      id: checkov
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      run: |
        set +e
        # Use terraform_plan framework to scan plan JSON (sees tags_all and module resources)
        checkov -f tfplan.json \
          --framework terraform_plan \
          --external-checks-dir ${{ github.action_path }}/policies \
          --output cli \
          --output json \
          --output-file-path . \
          --check CKV_AWS_TAG_001 \
          2>&1 | tee checkov_output.txt
        CHECKOV_EXIT=$?
        echo "exit_code=$CHECKOV_EXIT" >> $GITHUB_OUTPUT
        set -e

    - name: Parse results
      id: parse
      shell: bash
      env:
        TERRAFORM_DIR: ${{ inputs.terraform_directory }}
        SOFT_FAIL: ${{ inputs.soft_fail }}
      run: python3 ${{ github.action_path }}/bin/parse_results.py
