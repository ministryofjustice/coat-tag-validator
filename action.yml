name: 'COAT Tag Validator'
description: 'Validates Terraform resources have required tags using Checkov'
author: 'Ministry of Justice'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  terraform_directory:
    description: 'Path to Terraform files'
    required: true
    default: '.'
  terraform_workspace:
    description: 'Terraform workspace name'
    required: false
    default: ''
  terraform_plan_backend:
    description: 'Terraform backend for plan — local plans all resources in the module; remote uses your configured backend and state'
    required: false
    default: 'local'

runs:
  using: 'composite'
  steps:
    - name: Set Up UV
      id: setup_uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "latest"
        python-version: "3.12"
        enable-cache: true
        save-cache: false
        cache-dependency-glob: ${{ github.action_path }}/requirements.txt

    - name: Create venv and install dependencies
      shell: bash
      run: |
        uv venv "${{ github.action_path }}/.venv"
        echo "${{ github.action_path }}/.venv/bin" >> "$GITHUB_PATH"
        echo "VIRTUAL_ENV=${{ github.action_path }}/.venv" >> "$GITHUB_ENV"
        uv pip install --python "${{ github.action_path }}/.venv/bin/python" -r "${{ github.action_path }}/requirements.txt"

    - name: Save uv cache
      if: always() && steps.setup_uv.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: ${{ steps.setup_uv.outputs.cache-key }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_wrapper: false

    - name: Generate Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      env:
        WORKSPACE: ${{ inputs.terraform_workspace }}
        TERRAFORM_PLAN_BACKEND: ${{ inputs.terraform_plan_backend }}
      run: python3 -u ${{ github.action_path }}/bin/run_terraform_plan.py

    - name: Run Checkov on plan
      id: checkov
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      run: |
        set +e
        checkov -f tfplan.json \
          --framework terraform_plan \
          --external-checks-dir ${{ github.action_path }}/policies \
          --check CKV_AWS_TAG_001 \
          --output json \
          --output-file-path .
          
        echo "exit_code=$?" >> $GITHUB_OUTPUT
        set -e

    - name: Parse results
      id: parse-results
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      run: python3 ${{ github.action_path }}/bin/parse_results.py

    - name: Post Checkov Table to PR
      if: always() && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
      with:
        header: tag-validation-results
        message: |
          ${{ steps.parse-results.outputs.violations_summary }}

    - name: Fail workflow if Checkov failed
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.checkov.outputs.exit_code }}" -ne 0 ]; then
          exit ${{ steps.checkov.outputs.exit_code }}
        fi