name: 'COAT Tag Validator'
description: 'Validates Terraform resources have required tags using Checkov'
author: 'Ministry of Justice'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  terraform_directory:
    description: 'Path to Terraform files'
    required: true
    default: '.'
  soft_fail:
    description: 'Return exit code 0 even if violations found'
    required: false
    default: 'false'
  terraform_workspace:
    description: 'Terraform workspace name'
    required: false
    default: ''
  terraform_plan_backend:
    description: 'Terraform backend for plan — local plans all resources in the module; remote uses your configured backend and state'
    required: false
    default: 'local'

outputs:
  violations_count:
    description: 'Number of tag violations found'
    value: ${{ steps.parse.outputs.violations_count }}
  violations_summary:
    description: 'Markdown summary of violations for PR comments'
    value: ${{ steps.parse.outputs.violations_summary }}
  passed:
    description: 'Whether validation passed (true/false)'
    value: ${{ steps.parse.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Set Up UV
      id: setup_uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "latest"
        python-version: "3.12"
        enable-cache: true
        save-cache: false
        cache-dependency-glob: ${{ github.action_path }}/requirements.txt

    - name: Create venv and install dependencies
      shell: bash
      run: |
        uv venv "${{ github.action_path }}/.venv"
        echo "${{ github.action_path }}/.venv/bin" >> "$GITHUB_PATH"
        echo "VIRTUAL_ENV=${{ github.action_path }}/.venv" >> "$GITHUB_ENV"
        uv pip install --python "${{ github.action_path }}/.venv/bin/python" -r "${{ github.action_path }}/requirements.txt"

    - name: Save uv cache
      if: always() && steps.setup_uv.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.UV_CACHE_DIR }}
        key: ${{ steps.setup_uv.outputs.cache-key }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_wrapper: false

    - name: Generate Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      env:
        WORKSPACE: ${{ inputs.terraform_workspace }}
        TERRAFORM_PLAN_BACKEND: ${{ inputs.terraform_plan_backend }}
      run: python3 -u ${{ github.action_path }}/bin/run_terraform_plan.py

    - name: Run Checkov on plan
      id: checkov
      shell: bash
      working-directory: ${{ inputs.terraform_directory }}
      run: |
        set +e
        # Use terraform_plan framework to scan plan JSON (sees tags_all and module resources)
        checkov -f tfplan.json \
          --framework terraform_plan \
          --external-checks-dir ${{ github.action_path }}/policies \
          --output cli \
          --output-file-path . \
          --check CKV_AWS_TAG_001 \
          2>&1 | tee checkov_output.txt
        CHECKOV_EXIT=$?
        echo "exit_code=$CHECKOV_EXIT" >> $GITHUB_OUTPUT
        set -e

    # - name: Parse results
    #   id: parse
    #   shell: bash
    #   working-directory: ${{ inputs.terraform_directory }}
    #   env:
    #     SOFT_FAIL: ${{ inputs.soft_fail }}
    #   run: python3 ${{ github.action_path }}/bin/parse_results.py