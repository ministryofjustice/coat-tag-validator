name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

  test-action:
    name: Test Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test Terraform (compliant)
        run: |
          mkdir -p test-terraform/compliant
          cat > test-terraform/compliant/main.tf << 'EOF'
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "eu-west-2"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            access_key                  = "mock"
            secret_key                  = "mock"
          }

          resource "aws_s3_bucket" "test" {
            bucket = "test-bucket-compliant"

            tags = {
              business-unit = "HMPPS"
              application   = "test-app"
              owner         = "test@example.com"
              is-production = "false"
              service-area  = "testing"
              environment   = "development"
            }
          }
          EOF

      - name: Create test Terraform (non-compliant)
        run: |
          mkdir -p test-terraform/non-compliant
          cat > test-terraform/non-compliant/main.tf << 'EOF'
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "eu-west-2"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            access_key                  = "mock"
            secret_key                  = "mock"
          }

          resource "aws_s3_bucket" "test" {
            bucket = "test-bucket-missing-tags"

            tags = {
              Name = "incomplete"
            }
          }
          EOF

      - name: Test compliant resources pass
        uses: ./
        with:
          terraform_directory: test-terraform/compliant

      - name: Test non-compliant resources fail
        id: non-compliant
        uses: ./
        continue-on-error: true
        with:
          terraform_directory: test-terraform/non-compliant

      - name: Verify non-compliant check failed
        run: |
          if [ "${{ steps.non-compliant.outputs.passed }}" = "true" ]; then
            echo "ERROR: Non-compliant resources should have failed"
            exit 1
          fi
          echo "✅ Non-compliant resources correctly detected"

      - name: Create test Terraform (whitespace tags)
        run: |
          mkdir -p test-terraform/whitespace
          cat > test-terraform/whitespace/main.tf << 'EOF'
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "eu-west-2"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            access_key                  = "mock"
            secret_key                  = "mock"
          }

          resource "aws_s3_bucket" "whitespace_tags" {
            bucket = "test-bucket-whitespace-tags"

            tags = {
              business-unit = "HMPPS"
              application   = "test-app"
              owner         = "  "
              is-production = "false"
              service-area  = "testing"
              environment   = "development"
            }
          }
          EOF

      - name: Test whitespace tags fail
        id: whitespace
        uses: ./
        continue-on-error: true
        with:
          terraform_directory: test-terraform/whitespace
          required_tags: |
            business-unit
            application
            owner

      - name: Verify whitespace tags detected
        run: |
          if [ "${{ steps.whitespace.outputs.passed }}" = "true" ]; then
            echo "ERROR: Whitespace-only tags should have failed"
            exit 1
          fi
          echo "✅ Whitespace-only tags correctly detected"

      - name: Create test Terraform (empty tags)
        run: |
          mkdir -p test-terraform/empty
          cat > test-terraform/empty/main.tf << 'EOF'
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "eu-west-2"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            access_key                  = "mock"
            secret_key                  = "mock"
          }

          resource "aws_s3_bucket" "empty_tags" {
            bucket = "test-bucket-empty-tags"

            tags = {
              business-unit = "HMPPS"
              application   = ""
              owner         = ""
              is-production = "false"
              service-area  = "testing"
              environment   = "development"
            }
          }
          EOF

      - name: Test empty tags fail
        id: empty
        uses: ./
        continue-on-error: true
        with:
          terraform_directory: test-terraform/empty
          required_tags: |
            business-unit
            application
            owner

      - name: Verify empty tags detected
        run: |
          if [ "${{ steps.empty.outputs.passed }}" = "true" ]; then
            echo "ERROR: Empty tags should have failed"
            exit 1
          fi
          echo "✅ Empty tags correctly detected"

      - name: Create test Terraform (invalid values)
        run: |
          mkdir -p test-terraform/invalid_values
          cat > test-terraform/invalid_values/main.tf << 'EOF'
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "eu-west-2"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            access_key                  = "mock"
            secret_key                  = "mock"
          }

          resource "aws_s3_bucket" "invalid_tags" {
            bucket = "test-bucket-invalid-tags"

            tags = {
              business-unit = "HQ"
              application   = "test"
              owner         = "test"
              is-production = "false"
              service-area  = "testing"
              environment   = "development"
            }
          }
          EOF

      - name: Test invalid tags fail
        id: invalid-tags
        uses: ./
        continue-on-error: true
        with:
          terraform_directory: test-terraform/invalid_values

      - name: Verify invalid tags detected
        run: |
          if [ "${{ steps.empty.outputs.passed }}" = "true" ]; then
            echo "ERROR: Invalid tags should have failed"
            exit 1
          fi
          echo "✅ Invalid tags correctly detected"
