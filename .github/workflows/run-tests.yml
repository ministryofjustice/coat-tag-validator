name: Test action

on:
  pull_request:
    branches: [main]

jobs:
  test-compliant:
    name: ${{ matrix.case.name }}
    name: Case - Correctly tagged resource
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: Case - Correctly tagged resource
            dir: tests/correctly_tagged
          - name: Case - Untaggable resource
            dir: tests/untaggable_resource
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action
        uses: ./
        with:
          terraform_directory: ${{ matrix.case.dir }}

  test-non-compliant:
    name: ${{ matrix.case.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: Case - Missing all tags
            dir: tests/missing_all_tags
          - name: Case - Missing tag
            dir: tests/missing_tag
          - name: Case - Whitespace tag values
            dir: tests/whitespace_values
          - name: Case - Empty tag values
            dir: tests/empty_values
          - name: Case - Invalid tag values
            dir: tests/invalid_values
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action
        id: run
        uses: ./
        continue-on-error: true
        with:
          terraform_directory: ${{ matrix.case.dir }}

      - name: Assert violations were detected
        run: |
          if [ "${{ steps.run.outputs.passed }}" = "true" ]; then
            echo "ERROR: Non-compliant resources should have failed"
            exit 1
          fi
          echo "✅ Non-compliant resources correctly detected"